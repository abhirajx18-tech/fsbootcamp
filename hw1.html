<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Event Registration</title>
</head>
<body>
    <center>
        <h1>
            <span>College Event Registration</span>
            <span class="emoji">📋</span>
        </h1>
        <br>
    </center>
        <form>
            <div class="form-group">
                <label for="name">Your Name:</label>
                <input type="text" id="name" name="name">
            </div>
            <br>
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email">
            </div>
            <br>
            <div class="form-group">
                <label for="age">Age:</label>
                <input type="number" id="age" name="age">
            </div>
            <br>
            <div class="form-group">
                <div class="category-label">Select Event Category:</div>
                <div class="checkbox-group">
                    <div class="checkbox-item">
                        <input type="checkbox" id="hackathon" name="category" value="hackathon">
                        <label for="hackathon">Coding Hackathon 💻</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="debate" name="category" value="debate">
                        <label for="debate">Debate Competition 🎤</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="sports" name="category" value="sports">
                        <label for="sports">Sports Tournament ⚽</label>
                    </div>
                </div>
            </div>
            <br>
            <div class="form-group">
                <label for="date">Event Date:</label>
                <input type="date" id="date" name="date" placeholder="dd-mm-yyyy">
            </div>
            <br>
            <div class="form-group">
                <label for="time">Preferred Time Slot:</label>
                <input type="time" id="time" name="time">
            </div>
            
            <button type="button">Register Now</button>
        </form>
</body>
</html>
