<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weekly Schedule</title>
</head>
<body>
    <center>
    <h1>Weekly Schedule</h1>
    
    <table border="1" cellspacing="0" cellpadding="10">
        <thead>
            <tr>
                <th>Time</th>
                <th>Monday</th>
                <th>Tuesday</th>
                <th>Wednesday</th>
                <th>Thursday</th>
                <th>Friday</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td class="time-col" rowspan="2">Morning</td>
                <td rowspan="2">Math<br>Physics</td>
                <td colspan="2">Science Lab</td>
                <td rowspan="2">History<br>Geography</td>
                <td rowspan="2">English<br>Sports</td>
            </tr>
            <tr></tr>
            
            <tr>
                <td class="time-col">Afternoon</td>
                <td colspan="5">Lunch Break</td>
            </tr>
            
            <tr>
                <td class="time-col">Evening</td>
                <td>Computer Science</td>
                <td>Art</td>
                <td>Music</td>
                <td>Drama</td>
                <td>Free Period</td>
            </tr>
            
            <tr>
                <td class="time-col">Late Evening</td>
                <td colspan="2">Self Study</td>
                <td>Music</td>
                <td>Debate</td>
                <td>Sports</td>
            </tr>
        </tbody>
    </table>
    </center>
</body>
</html>
